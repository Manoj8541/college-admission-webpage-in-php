    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Handle 'Same as Correspondence Address' checkbox
            const sameAddressCheckbox = document.getElementById('sameAsCorrespondence');
            const permanentAddressTextarea = document.getElementById('permanentAddress');
            const correspondenceAddressTextarea = document.getElementById('correspondenceAddress');

            sameAddressCheckbox.addEventListener('change', function() {
                if (this.checked) {
                    permanentAddressTextarea.value = correspondenceAddressTextarea.value;
                    permanentAddressTextarea.disabled = true;
                } else {
                    permanentAddressTextarea.value = '';
                    permanentAddressTextarea.disabled = false;
                }
            });

            // Aadhar number validation
            const aadharInput = document.getElementById('aadharNumber');
            aadharInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
                if (this.value.length > 12) {
                    this.value = this.value.slice(0, 12);
                }
                
                // Check for repeating digits
                const digitCounts = {};
                for (let digit of this.value) {
                    digitCounts[digit] = (digitCounts[digit] || 0) + 1;
                    if (digitCounts[digit] > 10) {
                        alert('Aadhar number should not have any digit repeating more than 10 times');
                        this.value = '';
                        break;
                    }
                }
            });

            // File size validation
            const fileInputs = document.querySelectorAll('input[type="file"]');
            fileInputs.forEach(input => {
                input.addEventListener('change', function() {
                    if (this.files[0].size > 2 * 1024 * 1024) {
                        alert('File size should not exceed 2MB');
                        this.value = '';
                    }
                });
            });

            
document.addEventListener('DOMContentLoaded', function() {
    const streamRadios = document.querySelectorAll('input[name="twelfthStream"]');
    const streamSpecificOptions = document.getElementById('streamSpecificOptions');
    const scienceOptions = document.getElementById('scienceOptions');
    const commerceOptions = document.getElementById('commerceOptions');
    const artsOptions = document.getElementById('artsOptions');

    streamRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            streamSpecificOptions.style.display = 'block';
            scienceOptions.style.display = 'none';
            commerceOptions.style.display = 'none';
            artsOptions.style.display = 'none';

            switch(this.value) {
                case 's':
                    scienceOptions.style.display = 'block';
                    break;
                case 'c':
                    commerceOptions.style.display = 'block';
                    break;
                case 'a':
                    artsOptions.style.display = 'block';
                    break;
            }
        });
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const streamRadios = document.querySelectorAll('input[name="twelfthStream"]');
    const streamSpecificOptions = document.getElementById('streamSpecificOptions');
    const scienceOptions = document.getElementById('scienceOptions');
    const commerceOptions = document.getElementById('commerceOptions');
    const artsOptions = document.getElementById('artsOptions');
    const streamOptionInputs = document.querySelectorAll('input[name="streamOption"]');

    function resetStreamOptions() {
        streamSpecificOptions.style.display = 'none';
        scienceOptions.style.display = 'none';
        commerceOptions.style.display = 'none';
        artsOptions.style.display = 'none';
        streamOptionInputs.forEach(input => {
            input.checked = false;
            input.required = false;
        });
    }

    streamRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            resetStreamOptions();
            streamSpecificOptions.style.display = 'block';

            switch(this.value) {
                case 's':
                    scienceOptions.style.display = 'block';
                    document.querySelectorAll('#scienceOptions input[name="streamOption"]').forEach(input => input.required = true);
                    break;
                case 'c':
                    commerceOptions.style.display = 'block';
                    document.querySelectorAll('#commerceOptions input[name="streamOption"]').forEach(input => input.required = true);
                    break;
                case 'a':
                    artsOptions.style.display = 'block';
                    document.querySelectorAll('#artsOptions input[name="streamOption"]').forEach(input => input.required = true);
                    break;
            }
        });
    });
});
            // Form submission
            document.getElementById('admissionForm').addEventListener('submit', function(e) {
                e.preventDefault();
                // You can add additional client-side validation here
                this.submit();
            });
        });
    </script>
